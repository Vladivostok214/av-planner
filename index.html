<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV Planner | Marketing Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'av-planner-default';

        window.appState = {
            user: null,
            projects: [],
            currentProject: null,
            view: 'dashboard'
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.appState.user = user;
            if (user) {
                loadData();
            }
        });

        const loadData = () => {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
            onSnapshot(q, (snapshot) => {
                window.appState.projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            }, (error) => {
                console.error("Error loading data", error);
            });
        };

        const saveProject = async (projectData) => {
            if (!window.appState.user) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), {
                    ...projectData,
                    status: 'Idea',
                    createdAt: new Date().toISOString()
                });
            } catch (e) {
                console.error("Error saving", e);
            }
        };

        const updateProjectStatus = async (projectId, newStatus) => {
            if (!window.appState.user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId);
            await updateDoc(docRef, { status: newStatus });
        };

        const wrapLabel = (label) => {
            if (typeof label !== 'string') return label;
            if (label.length <= 16) return label;
            const words = label.split(' ');
            const lines = [];
            let currentLine = "";
            words.forEach(word => {
                if ((currentLine + word).length > 16) {
                    lines.push(currentLine.trim());
                    currentLine = word + " ";
                } else {
                    currentLine += word + " ";
                }
            });
            lines.push(currentLine.trim());
            return lines;
        };

        const renderChart = () => {
            const ctx = document.getElementById('statsChart');
            if (!ctx) return;
            
            const stats = {
                'Idea': 0,
                'Scripting': 0,
                'Storyboard': 0,
                'Producción': 0,
                'Finalizado': 0
            };
            
            window.appState.projects.forEach(p => {
                if (stats[p.status] !== undefined) stats[p.status]++;
            });

            if (window.myChart) window.myChart.destroy();

            window.myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(stats).map(wrapLabel),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#FFC300', '#FF5733', '#C70039', '#900C3F', '#581845'],
                        borderWidth: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                title: function(tooltipItems) {
                                    const item = tooltipItems[0];
                                    let label = item.chart.data.labels[item.dataIndex];
                                    return Array.isArray(label) ? label.join(' ') : label;
                                }
                            }
                        }
                    }
                }
            });
        };

        const renderApp = () => {
            const root = document.getElementById('app');
            if (window.appState.view === 'dashboard') {
                root.innerHTML = `
                    <div class="p-6 max-w-6xl mx-auto">
                        <header class="flex justify-between items-center mb-8">
                            <div>
                                <h1 class="text-4xl font-bold text-[#581845]">AV Content Planner</h1>
                                <p class="text-gray-500">Panel de Control de Marketing</p>
                            </div>
                            <button onclick="window.setView('new')" class="bg-[#C70039] text-white px-6 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition-transform">
                                + Nueva Idea
                            </button>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 md:col-span-1">
                                <h3 class="font-bold mb-4 text-gray-700 text-center">Estado del Pipeline</h3>
                                <div class="relative h-64 w-full mx-auto">
                                    <canvas id="statsChart"></canvas>
                                </div>
                            </div>
                            <div class="md:col-span-2 grid grid-cols-2 gap-4">
                                <div class="bg-[#FFC300] p-6 rounded-3xl text-[#581845]">
                                    <span class="text-4xl block mb-2">💡</span>
                                    <h4 class="font-bold text-xl">${window.appState.projects.length}</h4>
                                    <p class="text-sm opacity-80">Ideas Registradas</p>
                                </div>
                                <div class="bg-[#581845] p-6 rounded-3xl text-white">
                                    <span class="text-4xl block mb-2">🎬</span>
                                    <h4 class="font-bold text-xl">${window.appState.projects.filter(p => p.status === 'Producción').length}</h4>
                                    <p class="text-sm opacity-80">En Producción</p>
                                </div>
                                <div class="bg-white p-6 rounded-3xl border border-gray-100 flex items-center justify-between col-span-2">
                                    <div>
                                        <h4 class="font-bold text-gray-800">Próxima Grabación</h4>
                                        <p class="text-sm text-gray-500">Video de Campaña Semanal</p>
                                    </div>
                                    <div class="text-right">
                                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Mañana</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <h2 class="text-2xl font-bold mb-6 text-[#581845]">Proyectos Recientes</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${window.appState.projects.map(p => `
                                <div onclick="window.viewDetail('${p.id}')" class="bg-white p-6 rounded-3xl shadow-sm border border-transparent hover:border-[#C70039] cursor-pointer transition-all group">
                                    <div class="flex justify-between items-start mb-4">
                                        <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusClass(p.status)}">${p.status}</span>
                                        <span class="text-gray-300 group-hover:text-[#C70039]">➔</span>
                                    </div>
                                    <h3 class="font-bold text-lg mb-2 text-gray-800">${p.title}</h3>
                                    <p class="text-sm text-gray-500 line-clamp-2 mb-4">${p.description}</p>
                                    <div class="flex items-center text-xs text-gray-400">
                                        <span class="mr-2">📁 ${p.category}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                renderChart();
            } else if (window.appState.view === 'new') {
                root.innerHTML = `
                    <div class="p-6 max-w-2xl mx-auto">
                        <button onclick="window.setView('dashboard')" class="text-gray-500 mb-6 flex items-center hover:text-[#581845]">
                            <span class="mr-2">←</span> Volver al Dashboard
                        </button>
                        <div class="bg-white p-8 rounded-3xl shadow-xl">
                            <h2 class="text-3xl font-bold mb-6 text-[#581845]">Capturar Nueva Idea</h2>
                            <form id="ideaForm" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-1">Título del Proyecto</label>
                                    <input type="text" id="title" required class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-[#FF5733]" placeholder="Ej: Tutorial de Producto X">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-1">Categoría/Tema</label>
                                    <select id="category" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-[#FF5733]">
                                        <option>Social Media</option>
                                        <option>Educativo</option>
                                        <option>Institucional</option>
                                        <option>Publicidad</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-1">Descripción Breve</label>
                                    <textarea id="description" rows="3" required class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-[#FF5733]" placeholder="¿De qué trata este video?"></textarea>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-1">Script Inicial / Notas</label>
                                    <textarea id="script" rows="4" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-[#FF5733]" placeholder="Escribe las primeras líneas del guion..."></textarea>
                                </div>
                                <button type="submit" class="w-full bg-[#581845] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#900C3F] transition-colors">
                                    Guardar y Comenzar Planificación
                                </button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('ideaForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const data = {
                        title: document.getElementById('title').value,
                        category: document.getElementById('category').value,
                        description: document.getElementById('description').value,
                        script: document.getElementById('script').value
                    };
                    await saveProject(data);
                    window.setView('dashboard');
                };
            } else if (window.appState.view === 'detail') {
                const p = window.appState.currentProject;
                root.innerHTML = `
                    <div class="p-6 max-w-6xl mx-auto">
                        <button onclick="window.setView('dashboard')" class="text-gray-500 mb-6 flex items-center hover:text-[#581845]">
                            <span class="mr-2">←</span> Volver al Dashboard
                        </button>
                        
                        <div class="flex flex-col md:flex-row justify-between items-start mb-8 gap-4">
                            <div>
                                <span class="bg-[#FFC300] text-[#581845] px-3 py-1 rounded-full text-xs font-bold mb-2 inline-block">${p.category}</span>
                                <h1 class="text-4xl font-bold text-[#581845]">${p.title}</h1>
                            </div>
                            <div class="flex gap-2">
                                <select onchange="window.updateStatus('${p.id}', this.value)" class="p-2 rounded-lg bg-white border border-gray-200 text-sm font-bold">
                                    <option ${p.status === 'Idea' ? 'selected' : ''}>Idea</option>
                                    <option ${p.status === 'Scripting' ? 'selected' : ''}>Scripting</option>
                                    <option ${p.status === 'Storyboard' ? 'selected' : ''}>Storyboard</option>
                                    <option ${p.status === 'Producción' ? 'selected' : ''}>Producción</option>
                                    <option ${p.status === 'Finalizado' ? 'selected' : ''}>Finalizado</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div class="lg:col-span-2 space-y-8">
                                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 class="font-bold text-xl mb-4 text-[#581845] flex items-center">
                                        <span class="mr-2">📝</span> Guion Literario
                                    </h3>
                                    <div class="bg-gray-50 p-6 rounded-2xl font-mono text-sm leading-relaxed min-h-[300px] outline-none" contenteditable="true">
                                        ${p.script || 'Comienza a escribir el guion aquí...'}
                                    </div>
                                </div>

                                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 class="font-bold text-xl mb-4 text-[#581845] flex items-center">
                                        <span class="mr-2">🎨</span> Storyboard Visual
                                    </h3>
                                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        ${[1, 2, 3, 4, 5, 6].map(i => `
                                            <div class="aspect-video bg-gray-100 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-300 flex-col group cursor-pointer hover:border-[#FF5733] transition-colors">
                                                <span class="text-2xl mb-1">🖼️</span>
                                                <span class="text-[10px] font-bold">ESCENA ${i}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-8">
                                <div class="bg-[#581845] p-6 rounded-3xl text-white">
                                    <h3 class="font-bold text-xl mb-4 flex items-center">
                                        <span class="mr-2">📹</span> Previsualización
                                    </h3>
                                    <div class="aspect-video bg-black/20 rounded-2xl flex items-center justify-center flex-col text-white/50 border border-white/10">
                                        <span class="text-4xl mb-2">▶️</span>
                                        <p class="text-xs">Video no procesado aún</p>
                                    </div>
                                    <div class="mt-6 space-y-3">
                                        <div class="flex justify-between text-xs">
                                            <span>Progreso de edición</span>
                                            <span>20%</span>
                                        </div>
                                        <div class="w-full bg-white/10 rounded-full h-2">
                                            <div class="bg-[#FFC300] h-2 rounded-full w-[20%]"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 class="font-bold text-sm mb-4 text-gray-400 uppercase tracking-widest">Detalles Técnicos</h3>
                                    <ul class="space-y-4 text-sm">
                                        <li class="flex justify-between">
                                            <span class="text-gray-500">Formato</span>
                                            <span class="font-bold">9:16 (Vertical)</span>
                                        </li>
                                        <li class="flex justify-between">
                                            <span class="text-gray-500">Duración Est.</span>
                                            <span class="font-bold">60 Segundos</span>
                                        </li>
                                        <li class="flex justify-between">
                                            <span class="text-gray-500">Locación</span>
                                            <span class="font-bold">Estudio A</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        const getStatusClass = (status) => {
            const classes = {
                'Idea': 'bg-yellow-100 text-yellow-700',
                'Scripting': 'bg-orange-100 text-orange-700',
                'Storyboard': 'bg-red-100 text-red-700',
                'Producción': 'bg-purple-100 text-purple-700',
                'Finalizado': 'bg-green-100 text-green-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-700';
        };

        window.setView = (view) => {
            window.appState.view = view;
            renderApp();
        };

        window.viewDetail = (id) => {
            window.appState.currentProject = window.appState.projects.find(p => p.id === id);
            window.appState.view = 'detail';
            renderApp();
        };

        window.updateStatus = async (id, status) => {
            await updateProjectStatus(id, status);
        };

        window.onload = async () => {
            await initAuth();
            renderApp();
        };
    </script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
    </style>
</head>
<body class="antialiased text-gray-900">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-pulse flex flex-col items-center">
                <div class="w-12 h-12 bg-[#C70039] rounded-full mb-4"></div>
                <p class="text-[#581845] font-bold">Cargando Planificador...</p>
            </div>
        </div>
    </div>
</body>
</html>
